name: SBOM Generation

on:
  pull_request:
    paths:
      - 'control-plane/package.json'
      - 'control-plane/package-lock.json'
      - 'platform/package.json'
      - 'platform/package-lock.json'
      - 'fleet/package.json'
      - 'fleet/package-lock.json'
      - 'mcp-server/package.json'
      - 'mcp-server/package-lock.json'
      - 'admiral/package.json'
      - 'admiral/package-lock.json'
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  generate-sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'control-plane/package-lock.json'

      - name: Install dependencies
        run: |
          for dir in control-plane platform fleet mcp-server admiral; do
            if [ -f "$dir/package-lock.json" ]; then
              cd "$dir" && npm install && cd ..
            fi
          done

      - name: Generate SBOM
        run: bash admiral/bin/generate_sbom.sh

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          retention-days: 90

      - name: Validate SBOM structure
        run: |
          echo "Validating SBOM..."
          jq '.bomFormat' sbom.cdx.json | grep -q "CycloneDX"
          jq '.specVersion' sbom.cdx.json | grep -q "1.5"
          COMPONENT_COUNT=$(jq '.components | length' sbom.cdx.json)
          echo "SBOM contains $COMPONENT_COUNT components"
          if [ "$COMPONENT_COUNT" -lt 1 ]; then
            echo "ERROR: SBOM has no components"
            exit 1
          fi
          echo "SBOM validation passed"
