name: SDLC Review

# Review agent for autonomous SDLC loop. Triggered when an agent-authored PR
# is opened or updated. Evaluates the PR against quality and security criteria,
# then either approves (auto-merge to feature branch) or requests changes
# (triggers next iteration of sdlc-agent.yml up to the iteration cap).

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write

jobs:
  review:
    # Only review PRs created by the SDLC agent
    if: contains(github.event.pull_request.labels.*.name, 'agent:authored')
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract iteration from labels
        id: meta
        run: |
          # Get current iteration from PR labels
          LABELS=$(gh pr view "${{ github.event.pull_request.number }}" --json labels -q '.labels[].name')
          ITERATION=1
          for label in $LABELS; do
            if [[ "$label" == iteration:* ]]; then
              ITERATION="${label#iteration:}"
            fi
          done
          echo "iteration=$ITERATION" >> "$GITHUB_OUTPUT"

          # Extract issue number from PR title (format: "agent: implement #N (iteration M)")
          TITLE="${{ github.event.pull_request.title }}"
          ISSUE_NUMBER=$(echo "$TITLE" | grep -oP '#\K[0-9]+' | head -1)
          echo "issue_number=${ISSUE_NUMBER:-0}" >> "$GITHUB_OUTPUT"

      - name: Run circuit breaker
        id: breaker
        run: |
          chmod +x admiral/sdlc/circuit-breaker.sh
          ITER="${{ steps.meta.outputs.iteration }}"
          ISSUE="${{ steps.meta.outputs.issue_number }}"
          RESULT=$(bash admiral/sdlc/circuit-breaker.sh "$ITER" "sdlc-issue-${ISSUE}")
          PROCEED=$(echo "$RESULT" | jq -r '.proceed')
          echo "proceed=$PROCEED" >> "$GITHUB_OUTPUT"

      - name: Get PR diff
        if: steps.breaker.outputs.proceed != 'false'
        run: |
          gh pr diff "${{ github.event.pull_request.number }}" > /tmp/pr_diff.txt

      - name: Build review prompt
        if: steps.breaker.outputs.proceed != 'false'
        run: |
          PR_BODY="${{ github.event.pull_request.body }}"
          DIFF=$(cat /tmp/pr_diff.txt)

          cat > /tmp/review_prompt.txt <<'PROMPT'
          You are an autonomous code review agent running in CI. Review this pull request against the Admiral Framework quality and security standards.

          ## Review Criteria

          **Quality (SO-08):**
          - Code follows existing patterns in the codebase
          - Conventional commits used
          - No unnecessary changes beyond task scope
          - Tests added or updated where appropriate
          - JSON is valid and parseable by jq
          - Shell scripts are POSIX-compatible

          **Security (SO-12, Zero-Trust):**
          - No secrets, credentials, or PII in code
          - No command injection vulnerabilities
          - No bypass of enforcement hooks
          - No modification of protected paths (aiStrat/, .github/workflows/, .claude/settings)

          **Scope (SO-03):**
          - Changes are within the scope described in the PR
          - No unrelated refactoring or feature additions

          ## PR Details
          PROMPT

          echo "" >> /tmp/review_prompt.txt
          echo "$PR_BODY" >> /tmp/review_prompt.txt
          echo "" >> /tmp/review_prompt.txt
          echo "## Diff" >> /tmp/review_prompt.txt
          echo '```diff' >> /tmp/review_prompt.txt
          # Truncate very large diffs to stay within token limits
          head -c 50000 /tmp/pr_diff.txt >> /tmp/review_prompt.txt
          echo '```' >> /tmp/review_prompt.txt

          cat >> /tmp/review_prompt.txt <<'PROMPT'

          ## Instructions

          Evaluate the diff above against the review criteria. Output your review in this exact format:

          VERDICT: APPROVE or REQUEST_CHANGES
          SUMMARY: One paragraph summary of findings.
          FEEDBACK: Specific actionable feedback (if requesting changes).
          PROMPT

      - name: Run Claude Code review agent
        if: steps.breaker.outputs.proceed != 'false'
        id: review
        run: |
          REVIEW_OUTPUT=$(npx -y @anthropic-ai/claude-code --print "$(cat /tmp/review_prompt.txt)")
          echo "$REVIEW_OUTPUT" > /tmp/review_output.txt

          # Parse verdict
          VERDICT=$(echo "$REVIEW_OUTPUT" | grep -oP 'VERDICT:\s*\K\S+' | head -1)
          echo "verdict=${VERDICT:-REQUEST_CHANGES}" >> "$GITHUB_OUTPUT"

      - name: Post review — Approve
        if: steps.breaker.outputs.proceed != 'false' && steps.review.outputs.verdict == 'APPROVE'
        run: |
          REVIEW_BODY=$(cat /tmp/review_output.txt)
          gh pr review "${{ github.event.pull_request.number }}" \
            --approve \
            --body "$(cat <<EOF
          **SDLC Review Agent — APPROVED**

          ${REVIEW_BODY}

          ---
          *Auto-approved by review agent. Human merge to main is still required.*
          EOF
          )"

      - name: Post review — Request Changes
        if: steps.breaker.outputs.proceed != 'false' && steps.review.outputs.verdict != 'APPROVE'
        run: |
          REVIEW_BODY=$(cat /tmp/review_output.txt)
          gh pr review "${{ github.event.pull_request.number }}" \
            --request-changes \
            --body "$(cat <<EOF
          **SDLC Review Agent — Changes Requested**

          ${REVIEW_BODY}

          ---
          *Review agent requested changes. Next iteration will attempt to address feedback.*
          EOF
          )"

      - name: Check iteration cap before retriggering
        if: steps.breaker.outputs.proceed != 'false' && steps.review.outputs.verdict != 'APPROVE'
        id: next
        run: |
          CURRENT="${{ steps.meta.outputs.iteration }}"
          MAX=$(jq -r '.max_iterations // 3' admiral/sdlc/loop-config.json)
          NEXT=$((CURRENT + 1))
          echo "next_iteration=$NEXT" >> "$GITHUB_OUTPUT"
          if [ "$NEXT" -gt "$MAX" ]; then
            echo "capped=true" >> "$GITHUB_OUTPUT"
          else
            echo "capped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Halt — iteration cap reached
        if: steps.next.outputs.capped == 'true'
        run: |
          ISSUE="${{ steps.meta.outputs.issue_number }}"
          gh pr edit "${{ github.event.pull_request.number }}" --add-label "needs-human"
          if [ "$ISSUE" != "0" ]; then
            gh issue comment "$ISSUE" \
              --body "**SDLC Loop — Iteration cap reached.** The review agent requested changes but the maximum iteration count has been reached. Human review required on PR #${{ github.event.pull_request.number }}."
          fi

      - name: Trigger next iteration
        if: steps.next.outputs.capped == 'false' && steps.review.outputs.verdict != 'APPROVE'
        run: |
          ISSUE="${{ steps.meta.outputs.issue_number }}"
          NEXT="${{ steps.next.outputs.next_iteration }}"
          FEEDBACK=$(cat /tmp/review_output.txt | head -c 5000)

          # Trigger sdlc-agent workflow for next iteration
          gh workflow run sdlc-agent.yml \
            --field issue_number="$ISSUE" \
            --field iteration="$NEXT" \
            --field review_feedback="$FEEDBACK"
