name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next version
        id: version
        run: |
          # Get current version from latest tag or default
          CURRENT=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          CURRENT="${CURRENT#v}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "${CURRENT%%-*}"

          case "${{ inputs.version_bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT"

      - name: Generate release notes
        id: notes
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)

          NOTES="## What's Changed\n\n"

          FEATS=$(git log "$LAST_TAG..HEAD" --oneline --grep="^feat" --format="- %s" 2>/dev/null || true)
          FIXES=$(git log "$LAST_TAG..HEAD" --oneline --grep="^fix" --format="- %s" 2>/dev/null || true)

          if [ -n "$FEATS" ]; then
            NOTES+="### Features\n${FEATS}\n\n"
          fi
          if [ -n "$FIXES" ]; then
            NOTES+="### Bug Fixes\n${FIXES}\n\n"
          fi

          printf '%s' "$NOTES" > release-notes.md

      - name: Create tag and GitHub Release
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
