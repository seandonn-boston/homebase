name: AI Landscape Monitor

# Scans the AI ecosystem for new releases, trending repos, and notable
# developments. Generates markdown digests, updates persistent state,
# and creates GitHub issues for high-priority findings.
#
# See aiStrat/monitor/ for architecture specs and scanner implementation.

on:
  schedule:
    # Daily at 07:00 UTC (standard scan)
    - cron: "0 7 * * *"
    # Weekly deep scan on Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      scan_type:
        description: "Type of scan to run"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - models
          - patterns
          - releases
          - discover
      dry_run:
        description: "Preview without saving state"
        required: false
        default: false
        type: boolean

permissions:
  contents: write      # To commit state and digests
  issues: write        # To create alert issues for high-priority findings

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine scan type
        id: scan-config
        run: |
          # Scheduled runs: detect daily vs weekly from cron trigger
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            if [[ "${{ github.event.schedule }}" == "0 6 * * 1" ]]; then
              echo "scan_type=discover" >> "$GITHUB_OUTPUT"
            else
              echo "scan_type=full" >> "$GITHUB_OUTPUT"
            fi
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "scan_type=${{ inputs.scan_type || 'full' }}" >> "$GITHUB_OUTPUT"
            echo "dry_run=${{ inputs.dry_run || 'false' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run scanner
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS="${{ steps.scan-config.outputs.scan_type }}"
          if [[ "${{ steps.scan-config.outputs.dry_run }}" == "true" ]]; then
            ARGS="$ARGS --dry-run"
          fi
          chmod +x aiStrat/monitor/scanner.sh
          bash aiStrat/monitor/scanner.sh $ARGS

      - name: Close stale Monitor issues (older than 7 days)
        if: steps.scan-config.outputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CUTOFF=$(date -u -d "7 days ago" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v-7d +%Y-%m-%dT%H:%M:%SZ)
          gh issue list --search "\"[Monitor] High-priority findings\" in:title" --state open --json number,title,createdAt --limit 100 | \
            python3 -c "
          import json, sys
          from datetime import datetime
          cutoff = datetime.fromisoformat('${CUTOFF}'.replace('Z', '+00:00'))
          issues = json.load(sys.stdin)
          for issue in issues:
              created = datetime.fromisoformat(issue['createdAt'].replace('Z', '+00:00'))
              if created < cutoff:
                  print(issue['number'])
          " | while read -r num; do
              echo "Closing stale Monitor issue #$num"
              gh issue close "$num" --comment "Auto-closed: superseded by newer scan. Findings archived in monitor/digests/." || true
            done

      - name: Commit state and digest
        if: steps.scan-config.outputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add aiStrat/monitor/state.json
          git add aiStrat/monitor/digests/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "monitor: scan digest $(date -u +%Y-%m-%d) [${{ steps.scan-config.outputs.scan_type }}]"
            git push
          fi
