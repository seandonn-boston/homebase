name: AI Landscape Monitor

# SPECIFICATION STUB — This workflow documents the intended CI behavior for the
# AI Landscape Monitor. The scanner module is not yet implemented.
# See aiStrat/monitor/ for the full architecture specification.
#
# When the scanner is implemented, this workflow will:
# 1. Run daily and weekly scans of the AI ecosystem
# 2. Generate digest files with findings
# 3. Create GitHub issues for high-priority findings
# 4. Commit state and digest files

on:
  schedule:
    # Daily at 07:00 UTC (morning scan)
    - cron: "0 7 * * *"
    # Weekly deep scan on Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      scan_type:
        description: "Type of scan to run"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - models
          - patterns
          - releases
          - discover
      dry_run:
        description: "Preview without saving state"
        required: false
        default: false
        type: boolean

permissions:
  contents: write      # To commit state and digests
  issues: write        # To create alert issues for high-priority findings
  pull-requests: write # To create PRs with seed candidates

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Monitor scanner (not yet implemented)
        run: |
          echo "========================================================"
          echo "AI Landscape Monitor — Scanner Not Yet Implemented"
          echo "========================================================"
          echo ""
          echo "This workflow is a specification stub. The scanner module"
          echo "has not yet been built. See the following specs:"
          echo ""
          echo "  - aiStrat/monitor/README.md (architecture overview)"
          echo "  - aiStrat/monitor/scanner-spec.md (scanner specification)"
          echo "  - aiStrat/monitor/state-schema.json (state file schema)"
          echo "  - aiStrat/monitor/digest-format.md (digest output format)"
          echo ""
          echo "To implement, create a scanner that conforms to these specs"
          echo "and update this workflow to invoke it."
          echo ""
          echo "Scan type requested: ${{ inputs.scan_type || 'scheduled' }}"
          echo "Dry run: ${{ inputs.dry_run || 'false' }}"
