# Admiral Spec-First Pipeline Manifest
# Maps pipeline stages to required artifact paths.
# Paths are relative to the ground-truth.yaml location.
#
# Customize per project. Each stage lists the documents that must exist
# before the fleet can take over at a downstream stage.

stages:
  requirements:
    # Requirements documents that must exist before Design/Tasks/Implementation
    - "docs/requirements.md"
  design:
    # Design documents that must exist before Tasks/Implementation
    - "docs/design.md"
  tasks:
    # Task decomposition that must exist before Implementation
    - "docs/tasks.md"
  # implementation: no upstream artifacts needed (entry point)
