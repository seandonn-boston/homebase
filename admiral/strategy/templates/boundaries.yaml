# Admiral Ground Truth — Boundaries Template
# Part 1: "Boundaries are the single most effective tool against agent drift."
#
# Fill in every section. For sections that do not apply, set the value to
# an array with a single "N/A: <justification>" entry.

non_goals:
  # Features, capabilities, or user flows explicitly out of scope.
  functional:
    - ""
  # Levels of polish, optimization, or completeness not required at this phase.
  quality:
    - ""
  # Patterns, technologies, or approaches that must not be used.
  architectural:
    - ""

hard_constraints:
  # Exact languages, frameworks, and tools with version numbers.
  tech_stack:
    - ""
  # Ship dates, demo dates, review dates.
  deadlines:
    - ""
  # Browser support, API backward compatibility, platform requirements.
  compatibility:
    - ""
  # Anything legally or organizationally mandated.
  regulatory:
    - ""
  # MCP servers approved for use, A2A requirements, trust classification.
  protocol_scope:
    - ""

resource_budgets:
  # Max tokens per task before the agent must deliver or escalate.
  token_budget: ""
  # Wall-clock time limit per task.
  time_budget: ""
  # Max API calls or tool invocations per task.
  tool_call_limits: ""
  # File paths, repos, and services each agent may touch.
  scope_boundary:
    - ""
  # Minimum acceptable quality bar, defined concretely.
  quality_floor: ""

llm_last:
  # Tasks handled by static analysis, linters, shell commands, type checkers.
  deterministic:
    - ""
  # Tasks requiring understanding of intent, tradeoffs, novel design.
  llm_judgment:
    - ""
