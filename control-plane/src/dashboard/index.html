<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admiral Control Plane</title>
  <style>
    :root {
      --bg: #0a0e17;
      --surface: #111827;
      --surface-2: #1a2234;
      --border: #1e293b;
      --text: #e2e8f0;
      --text-dim: #64748b;
      --accent: #3b82f6;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --orange: #f97316;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    header h1 span { color: var(--accent); }

    .status-bar {
      display: flex;
      gap: 24px;
      font-size: 13px;
      color: var(--text-dim);
    }

    .status-bar .live {
      color: var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto 1fr;
      gap: 1px;
      background: var(--border);
      min-height: calc(100vh - 57px);
    }

    .panel {
      background: var(--surface);
      padding: 16px;
      overflow: auto;
    }

    .panel-header {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-header .count {
      background: var(--surface-2);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
    }

    /* Event Stream Panel */
    .event-list {
      list-style: none;
      font-size: 12px;
      max-height: 35vh;
      overflow-y: auto;
    }

    .event-list li {
      padding: 4px 8px;
      border-left: 2px solid transparent;
      display: flex;
      gap: 8px;
    }

    .event-list li:hover { background: var(--surface-2); }

    .event-list .time { color: var(--text-dim); min-width: 75px; }
    .event-list .agent { color: var(--accent); min-width: 120px; }
    .event-list .detail { color: var(--text); }

    .event-list li.tool_called { border-left-color: var(--accent); }
    .event-list li.task_assigned { border-left-color: var(--green); }
    .event-list li.task_completed { border-left-color: var(--green); }
    .event-list li.task_failed { border-left-color: var(--red); }
    .event-list li.policy_violation { border-left-color: var(--orange); }
    .event-list li.token_spent { border-left-color: var(--yellow); }
    .event-list li.agent_started { border-left-color: var(--green); }

    /* Alerts Panel */
    .alert-list { list-style: none; }

    .alert-item {
      background: var(--surface-2);
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 8px;
      border-left: 3px solid var(--yellow);
    }

    .alert-item.critical { border-left-color: var(--red); }
    .alert-item.resolved { opacity: 0.4; }

    .alert-item .alert-type {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    .alert-item.critical .alert-type { color: var(--red); }
    .alert-item .alert-type { color: var(--yellow); }

    .alert-item .alert-msg {
      font-size: 13px;
      margin-bottom: 8px;
    }

    .alert-item .alert-actions {
      display: flex;
      gap: 8px;
    }

    .alert-item button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
    }

    .alert-item button:hover { background: var(--border); }
    .alert-item button.danger { border-color: var(--red); color: var(--red); }
    .alert-item button.primary { border-color: var(--accent); color: var(--accent); }

    /* Trace Panel */
    .trace-panel { grid-column: 1 / -1; }

    .trace-view {
      font-size: 13px;
      line-height: 1.8;
      white-space: pre;
      overflow-x: auto;
      padding: 8px;
      background: var(--bg);
      border-radius: 6px;
      min-height: 200px;
    }

    /* Stats Bar */
    .stats {
      display: flex;
      gap: 24px;
      padding: 12px 0;
      font-size: 12px;
      flex-wrap: wrap;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-label {
      color: var(--text-dim);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .empty-state {
      color: var(--text-dim);
      font-size: 13px;
      text-align: center;
      padding: 32px;
    }

    /* Session State Bar */
    .session-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      gap: 32px;
      align-items: center;
      font-size: 12px;
    }

    .session-bar .session-field {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .session-bar .field-label {
      color: var(--text-dim);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .session-bar .field-value {
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
    }

    .budget-bar-container {
      flex: 1;
      max-width: 300px;
    }

    .budget-bar {
      height: 8px;
      background: var(--surface-2);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 4px;
    }

    .budget-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s ease, background 0.3s ease;
    }

    .budget-bar-fill.ok { background: var(--green); }
    .budget-bar-fill.warn { background: var(--yellow); }
    .budget-bar-fill.critical { background: var(--red); }
  </style>
</head>
<body>
  <header>
    <h1><span>ADMIRAL</span> CONTROL PLANE</h1>
    <div class="status-bar">
      <span class="live">● LIVE</span>
      <span id="event-count">0 events</span>
      <span id="alert-count">0 alerts</span>
      <span id="agent-count">0 agents</span>
    </div>
  </header>

  <!-- Session State -->
  <div class="session-bar" id="session-bar" style="display:none">
    <div class="session-field">
      <span class="field-label">Session</span>
      <span class="field-value" id="session-id">—</span>
    </div>
    <div class="session-field">
      <span class="field-label">Tool Calls</span>
      <span class="field-value" id="session-tools">0</span>
    </div>
    <div class="session-field budget-bar-container">
      <span class="field-label">Token Budget <span id="budget-text">—</span></span>
      <div class="budget-bar"><div class="budget-bar-fill ok" id="budget-fill" style="width:0%"></div></div>
    </div>
    <div class="session-field">
      <span class="field-label">Hooks Fired</span>
      <span class="field-value" id="session-hooks">0</span>
    </div>
  </div>

  <div class="grid">
    <!-- Event Stream -->
    <div class="panel">
      <div class="panel-header">
        Event Stream
        <span class="count" id="stream-count">0</span>
      </div>
      <ul class="event-list" id="event-list"></ul>
      <div class="empty-state" id="events-empty">Waiting for agent events...</div>
    </div>

    <!-- Alerts -->
    <div class="panel">
      <div class="panel-header">
        Alerts
        <span class="count" id="alerts-badge">0</span>
      </div>
      <div id="alert-list"></div>
      <div class="empty-state" id="alerts-empty">No alerts. Agents operating normally.</div>
    </div>

    <!-- Execution Trace -->
    <div class="panel trace-panel">
      <div class="panel-header">
        Execution Trace
      </div>
      <div class="stats" id="stats"></div>
      <div class="trace-view" id="trace-view">Waiting for trace data...</div>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    let prevEventCount = 0;

    async function fetchJSON(path) {
      const res = await fetch(API + path);
      return res.json();
    }

    async function fetchText(path) {
      const res = await fetch(API + path);
      return res.text();
    }

    function formatTime(ts) {
      return new Date(ts).toLocaleTimeString();
    }

    function formatEventDetail(event) {
      switch (event.type) {
        case 'agent_started': return 'started';
        case 'agent_stopped': return 'stopped';
        case 'task_assigned': return `task: ${event.data.description}`;
        case 'task_completed': return 'task completed';
        case 'task_failed': return `failed: ${event.data.error}`;
        case 'tool_called': return `${event.data.tool}(${summarizeArgs(event.data.args)})`;
        case 'tool_result': return `${event.data.tool} → result`;
        case 'token_spent': return `${event.data.count} tokens (total: ${event.data.total})`;
        case 'subtask_created': return `→ ${event.data.description}`;
        case 'policy_violation': return `⚠ ${event.data.rule}: ${event.data.details}`;
        default: return event.type;
      }
    }

    function summarizeArgs(args) {
      if (!args) return '';
      return Object.entries(args).map(([k, v]) =>
        typeof v === 'string' ? `"${v}"` : JSON.stringify(v)
      ).join(', ');
    }

    function renderEvents(events) {
      const list = document.getElementById('event-list');
      const empty = document.getElementById('events-empty');

      if (events.length === 0) {
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      // Only render new events
      const newEvents = events.slice(prevEventCount);
      for (const event of newEvents) {
        const li = document.createElement('li');
        li.className = event.type;
        li.innerHTML = `
          <span class="time">${formatTime(event.timestamp)}</span>
          <span class="agent">${event.agentName}</span>
          <span class="detail">${formatEventDetail(event)}</span>
        `;
        list.appendChild(li);
      }
      prevEventCount = events.length;

      // Auto-scroll to bottom
      list.scrollTop = list.scrollHeight;

      document.getElementById('stream-count').textContent = events.length;
      document.getElementById('event-count').textContent = `${events.length} events`;
    }

    function renderAlerts(alerts) {
      const container = document.getElementById('alert-list');
      const empty = document.getElementById('alerts-empty');
      const active = alerts.filter(a => !a.resolved);

      document.getElementById('alerts-badge').textContent = active.length;
      document.getElementById('alert-count').textContent = `${active.length} alerts`;

      if (alerts.length === 0) {
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      container.innerHTML = alerts.map(alert => `
        <div class="alert-item ${alert.severity} ${alert.resolved ? 'resolved' : ''}">
          <div class="alert-type">${alert.severity} — ${alert.type.replace(/_/g, ' ')}</div>
          <div class="alert-msg">${alert.message}</div>
          ${!alert.resolved ? `
          <div class="alert-actions">
            <button class="primary" onclick="resolveAlert('${alert.id}')">Resolve</button>
            <button onclick="resumeAgent('${alert.agentId}')">Resume Agent</button>
          </div>` : ''}
        </div>
      `).join('');
    }

    async function renderTrace(ascii) {
      const view = document.getElementById('trace-view');
      view.textContent = ascii || 'No trace data yet.';
    }

    function renderStats(stats) {
      const container = document.getElementById('stats');
      document.getElementById('agent-count').textContent = `${stats.agentCount} agents`;

      container.innerHTML = `
        <div class="stat"><span class="stat-value">${stats.agentCount}</span><span class="stat-label">Agents</span></div>
        <div class="stat"><span class="stat-value">${stats.toolCallCount}</span><span class="stat-label">Tool Calls</span></div>
        <div class="stat"><span class="stat-value">${stats.totalTokens.toLocaleString()}</span><span class="stat-label">Tokens</span></div>
        <div class="stat"><span class="stat-value">${stats.subtaskCount}</span><span class="stat-label">Subtasks</span></div>
        <div class="stat"><span class="stat-value">${stats.failureCount}</span><span class="stat-label">Failures</span></div>
        <div class="stat"><span class="stat-value">${(stats.durationMs / 1000).toFixed(1)}s</span><span class="stat-label">Duration</span></div>
        <div class="stat"><span class="stat-value">${stats.eventCount}</span><span class="stat-label">Events</span></div>
      `;
    }

    async function resolveAlert(id) {
      await fetch(`${API}/api/alerts/${id}/resolve`, { method: 'POST' });
      refresh();
    }

    async function resumeAgent(id) {
      await fetch(`${API}/api/agents/${id}/resume`, { method: 'POST' });
      refresh();
    }

    function renderSession(session) {
      if (!session || session.error) return;
      const bar = document.getElementById('session-bar');
      bar.style.display = 'flex';

      const sid = session.session_id || '—';
      document.getElementById('session-id').textContent = sid.substring(0, 8);
      document.getElementById('session-tools').textContent = session.tool_call_count || 0;

      const used = session.tokens_used || 0;
      const budget = session.token_budget || 0;
      const pct = budget > 0 ? Math.min(100, (used / budget) * 100) : 0;
      const fill = document.getElementById('budget-fill');
      fill.style.width = budget > 0 ? pct + '%' : '0%';
      fill.className = 'budget-bar-fill ' + (pct > 90 ? 'critical' : pct > 70 ? 'warn' : 'ok');
      document.getElementById('budget-text').textContent = budget > 0
        ? `${used.toLocaleString()} / ${budget.toLocaleString()}`
        : `${used.toLocaleString()} (no budget set)`;
    }

    async function refresh() {
      try {
        const [events, alerts, ascii, stats, session] = await Promise.all([
          fetchJSON('/api/events'),
          fetchJSON('/api/alerts'),
          fetchText('/api/trace/ascii'),
          fetchJSON('/api/stats'),
          fetchJSON('/api/session'),
        ]);

        renderEvents(events);
        renderAlerts(alerts);
        renderTrace(ascii);
        renderStats(stats);
        renderSession(session);
        document.getElementById('session-hooks').textContent = events.length;
      } catch (e) {
        // Server may not be ready yet
      }
    }

    // Poll every second
    refresh();
    setInterval(refresh, 1000);
  </script>
</body>
</html>
